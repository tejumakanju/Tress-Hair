# Netlify — Tressé Hair storefront
# Repo root is this Next.js app (supabase/ lives here).

[build]
  command = "npm run build"
  # Leave publish to @netlify/plugin-nextjs (do NOT set Site settings → Publish to ".next")

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # NEXT_PUBLIC_* values are meant for the client bundle — omit from secret scan
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

# Next.js runtime is auto-detected by Netlify (OpenNext adapter).
# Do not pin @netlify/plugin-nextjs unless you need a specific version.
